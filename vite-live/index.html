<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- ✅ Title -->
    <title>Middletown Muse | Private Music Lessons with Jeffrey Jones</title>

    <!-- ✅ Favicon / App Icons -->
    <link rel="icon" type="image/png" href="/middletownmuse.png" />
    <link rel="apple-touch-icon" href="/middletownmuse.png" sizes="180x180" />
    <meta name="theme-color" content="#0F2E2B" />

    <!-- ✅ iOS PWA Setup -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta
      name="apple-mobile-web-app-title"
      content="Middletown Muse"
    />

    <!-- ✅ Android PWA Setup -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="application-name"
      content="Middletown Muse"
    />

    <meta
      name="description"
      content="Discover your musical voice with Middletown Muse. Private music lessons with Jeffrey Jones for singers and musicians of all ages and experience levels."

    <meta
      name="author"
      content="Jeffrey Jones"
    />

    <!-- ✅ Open Graph -->
    <meta
      property="og:title"
      content="Middletown Muse | Private Music Lessons with Jeffrey Jones"
    />

    <meta
      property="og:description"
      content="Unlock your musical potential with personalized private music lessons from Jeffrey Jones. Every lesson is tailored to help you grow with confidence."
    />

    <meta
      property="og:image"
      content="https://middletownmuse.netlify.app/middletownmuse.png"
    />

    <meta
      property="og:url"
      content="https://middletownmuse.netlify.app/"
    />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Middletown Muse" />

    <!-- ✅ Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Middletown Muse | Private Music Lessons with Jeffrey Jones"
    />

    <meta
      name="twitter:description"
      content="Personalized private music lessons designed to inspire creativity, confidence, and lifelong musicianship."
    />

    <meta
      name="twitter:image"
      content="https://middletownmuse.netlify.app/middletownmuse.png"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>

  <footer class="bg-[#0F2E2B] text-[#F7F2E7] py-4 relative overflow-hidden">
    <!-- Top Divider -->
    <div
      class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#C9A24B] via-[#E7C873] to-[#C9A24B]"
    ></div>

    <!-- Footer -->
    <div
      class="container mx-auto flex flex-col items-center justify-center text-center space-y-2 relative"
    >
      <a
        href="https://jwhitproductions.com/"
        target="_blank"
        rel="noopener noreferrer"
        class="shimmer-effect text-[#E7C873] text-xs sm:text-sm font-semibold tracking-[0.2em] uppercase hover:text-white transition-all duration-300"
      >
        &copy; <span id="current-year"></span> JWHIT Productions
      </a>

      <p class="text-[#F7F2E7]/70 text-[11px] sm:text-xs">
        Proudly designed and developed by JWHIT Productions. All rights
        reserved.
      </p>
    </div>

    <!-- Bottom Divider -->
    <div
      class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-[#C9A24B] via-[#E7C873] to-[#C9A24B]"
    ></div>

    <style>
      @keyframes shimmer {
        0% {
          background-position: -200px 0;
        }
        100% {
          background-position: 200px 0;
        }
      }

      .shimmer-effect {
        background: linear-gradient(
          90deg,
          transparent 20%,
          rgba(255, 255, 255, 0.45) 50%,
          transparent 80%
        );
        background-size: 200px 100%;
        animation: shimmer 2.5s linear infinite;
        display: inline-block;
        padding: 3px 0;
      }
    </style>

    <script>
      document.getElementById("current-year").textContent =
        new Date().getFullYear();
    </script>
